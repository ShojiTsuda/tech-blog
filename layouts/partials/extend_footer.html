<script>
/* ========== 検索バー連携JS ========== */

/* ホームや記事一覧から検索ページへ遷移 */
function homeSearchSubmit(form) {
  var q = form.querySelector('input[type="search"]').value.trim();
  if (q) {
    window.location.href = '/search/?q=' + encodeURIComponent(q);
  }
  return false;
}

/* 検索ページ：URLの ?q= パラメータを読んで自動検索
   fastsearch.js は onkeyup + 非同期XHR で動くため
   window.load 後に複数回 keyup をトリガーして確実に実行 */
(function () {
  if (!document.getElementById('searchInput')) return;

  var params = new URLSearchParams(window.location.search);
  var q = params.get('q');
  if (!q) return;

  var input = document.getElementById('searchInput');
  input.value = q;

  /* window.onload 後 + Fuse.js のXHR完了を待つため段階的に実行 */
  window.addEventListener('load', function () {
    [400, 800, 1400].forEach(function (delay) {
      setTimeout(function () {
        var ev = new KeyboardEvent('keyup', { bubbles: true, cancelable: true });
        input.dispatchEvent(ev);
      }, delay);
    });
  });
})();
</script>
