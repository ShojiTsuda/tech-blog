baseURL = "https://your-site.pages.dev"
languageCode = "ja"
title = "ガジェット＆テックレビュー"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true
paginate = 10

[params]
  description = "最新ガジェット・テック情報をわかりやすく紹介"
  author = "管理人"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  DateFormat = "2006年1月2日"

  [params.homeInfoParams]
    Title = "ガジェット＆テックレビュー"
    Content = "最新のガジェット・テックニュースをいち早くお届け。レビューからお得情報まで幅広く紹介します。"

[[menus.main]]
  name = "記事一覧"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "カテゴリ"
  url = "/categories/"
  weight = 2

[[menus.main]]
  name = "タグ"
  url = "/tags/"
  weight = 3

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false
