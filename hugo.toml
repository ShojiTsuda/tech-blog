baseURL = "https://tech-blog-djp.pages.dev"
languageCode = "ja"
title = "へぇ〜な話｜雑学・豆知識・ライフハック"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true
paginate = 10

[params]
  description = "思わず誰かに話したくなる雑学・豆知識・ライフハックを毎日お届け！"
  author = "管理人"
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  DateFormat = "2006年1月2日"

  [params.homeInfoParams]
    Title = "🌟 へぇ〜な話"
    Content = "思わず誰かに話したくなる雑学・豆知識・ライフハックを紹介します。毎日ちょっと賢くなれる情報をお届け！"

[[menus.main]]
  name = "記事一覧"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "雑学・豆知識"
  url = "/tags/雑学/"
  weight = 2

[[menus.main]]
  name = "ライフハック"
  url = "/tags/ライフハック/"
  weight = 3

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false
