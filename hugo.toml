baseURL = "https://choco-zatsugaku.com"
languageCode = "ja"
title = "ちょこっといい雑学 人生が豊かになる雑学集・ライフハック"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true
paginate = 10
enableRobotsTXT = true

[params]
description = "思わず誰かに話したくなる雑学・豆知識・ライフハックを毎日お届け！"
author = "管理人"
# SNSシェア時の共通デフォルト画像（画像なし記事・トップ・新記事に自動適用）
images = ["/images/og-default.png"]
defaultTheme = "light"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowToc = true
DateFormat = "2006年1月2日"

[params.assets]
favicon = "/favicon.svg"
favicon16x16 = "/favicon.svg"
favicon32x32 = "/favicon.svg"
apple_touch_icon = "/favicon.svg"
safari_pinned_tab = "/favicon.svg"
# 構造化データ（JSON-LD）の発行元ロゴ用画像（タブのfaviconとは別）
logo = "/images/logo.png"

[params.schema]
publisherType = "Organization"

[params.homeInfoParams]
Title = "ちょこっといい雑学 人生が豊かになる雑学集・ライフハック"
Content = "思わず誰かに話したくなる雑学・豆知識・ライフハックを毎日お届け。毎日ちょっと賢くなれる、人生が豊かになる雑学集です。"

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 1
limit = 12
keys = ["title", "permalink", "summary", "content"]

[[menus.main]]
identifier = "top"
name = "TOP"
url = "/"
weight = 1

[[menus.main]]
name = "記事一覧"
url = "/posts/"
weight = 2

[[menus.main]]
name = "カテゴリー"
url = "/categories/"
weight = 3

[[menus.main]]
identifier = "tag-zatsugaku"
name = "雑学・豆知識"
url = "/tags/雑学/"
weight = 4

[[menus.main]]
identifier = "tag-lifehack"
name = "ライフハック"
url = "/tags/ライフハック/"
weight = 5

[taxonomies]
category = "categories"
tag = "tags"

[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

# 関連記事（Related Posts）の判定設定
# タグ・カテゴリーの一致度で関連記事を自動抽出 → 内部リンク強化でSEO改善
[related]
includeNewer = true
threshold = 80
toLower = true

  [[related.indices]]
  name = "tags"
  weight = 100

  [[related.indices]]
  name = "categories"
  weight = 80

  [[related.indices]]
  name = "date"
  weight = 10

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
style = "monokai"
lineNos = false
